<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">



    <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
    <header>
      <div class="header-left">
        <!-- "Good afternoon" — written by getGreeting() in app.js -->
        <h1 id="greeting"></h1>
        <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
        <div class="date" id="dateDisplay"></div>
      </div>
      <div class="header-right">
        <button class="debug-toggle" id="debugToggle" title="Toggle debug mode">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="m6.75 7.5 3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0 0 21 18V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v12a2.25 2.25 0 0 0 2.25 2.25Z" />
          </svg>
        </button>
        <button class="settings-toggle" id="settingsToggle" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 0 1 0 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
        </button>

        <div class="settings-panel" id="settingsPanel" style="display:none">
          <div class="settings-header">Settings</div>
          <div class="settings-group">
            <div class="settings-label">Grouping Mode</div>
            <div class="toggle-group" id="groupingModeToggle">
              <label>
                <input type="radio" name="groupingMode" value="hostname" checked>
                <span>Full Hostname</span>
              </label>
              <label>
                <input type="radio" name="groupingMode" value="domain">
                <span>Base Domain</span>
              </label>
            </div>
            <div class="settings-subtext" id="groupingModeHint">
              Tabs are grouped by their specific address (e.g., play.google.com).
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
    <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
      <div class="tab-cleanup-left">
        <div class="tab-cleanup-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
          </svg>
        </div>
        <div class="tab-cleanup-text">
          You have <strong id="tabOutDupeCount"></strong> Tab Out tabs open. Keep just this one?
        </div>
      </div>
      <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
    </div>

    <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       ================================================================ -->
    <div class="dashboard-columns" id="dashboardColumns">

      <!-- LEFT COLUMN: Active Tasks & Open Tabs -->
      <div style="display: flex; flex-direction: column; gap: 24px; flex: 1; min-width: 600px;">
        <div id="activeTasksCol">
          <div class="tasks-widget">
            <div class="task-input-wrap">
              <input type="text" class="task-input" id="newTaskInput" placeholder="What are you focusing on? + Enter"
                autocomplete="off" spellcheck="false">
            </div>
            <div class="tasks-scroll-area">
              <!-- <div class="task-list-title">Working on</div> -->
              <div class="task-list" id="activeTasksList"></div>
              <div id="activeTasksEmpty"
                style="font-size:12px; color:var(--muted); padding: 12px 16px; font-style:italic; display:none;">
                <span class="tasks-empty-msg">No active tasks</span>
              </div>
            </div>
          </div>
        </div>

        <div class="active-section" id="openTabsSection" style="display:none">
          <div class="section-header">
            <h2 id="openTabsSectionTitle">Right now</h2>
            <div class="section-line"></div>
            <div class="section-count" id="openTabsSectionCount"></div>
          </div>
          <div class="missions" id="openTabsMissions"></div>
        </div>
      </div> <!-- END LEFT COLUMN WRAPPER -->

      <!-- RIGHT COLUMN: Standby Tasks & Saved for Later checklist -->
      <div style="display: flex; flex-direction: column; gap: 24px; width: 280px; flex-shrink: 0;">
        <div id="standbyTasksCol">
          <div class="section-header">
            <h2>Standby</h2>
            <div class="section-line"></div>
            <div class="section-count" id="standbyTasksCount"></div>
          </div>
          <div class="task-list" id="standbyTasksList" style="margin-bottom: 16px;"></div>
          <div class="deferred-empty" id="standbyTasksEmpty" style="display:none; margin-bottom: 16px; display:block;">
            Nothing on standby.</div>

          <div class="deferred-archive" id="inactiveTasksArchive"
            style="display:none; margin-top:0; border-top: 1px solid var(--warm-gray)">
            <button class="archive-toggle" data-action="toggle-tasks-archive" style="padding:8px 0;">
              <span>Inactive (<span id="inactiveTasksCount">0</span>)</span>
              <svg class="archive-chevron" style="width:12px;height:12px" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
              </svg>
            </button>
            <div class="archive-body" id="tasksArchiveListWrap" style="display:none; padding-top:0">
              <div class="archive-list" id="inactiveTasksList"></div>
            </div>
          </div>
        </div>

        <div class="deferred-column" id="deferredColumn" style="display:none">
          <div class="section-header">
            <h2>Saved for later</h2>
            <div class="section-line"></div>
            <div class="section-count" id="deferredCount"></div>
          </div>

          <!-- Active checklist items — injected by renderDeferredList() in app.js -->
          <div class="deferred-list" id="deferredList"></div>

          <!-- Empty state — shown when no active deferred tabs -->
          <div class="deferred-empty" id="deferredEmpty" style="display:none">
            Nothing saved. Living in the moment.
          </div>

          <!-- Archive section — collapsed by default -->
          <div class="deferred-archive" id="deferredArchive" style="display:none">
            <button class="archive-toggle" id="archiveToggle">
              <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
              </svg>
              Archive
              <span class="archive-count" id="archiveCount"></span>
            </button>
            <div class="archive-body" id="archiveBody" style="display:none">
              <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
              <div class="archive-list" id="archiveList"></div>
            </div>
          </div>
        </div>

        <!-- Google Tasks embed -->
        <div class="google-tasks-section" id="googleTasksSection">
          <div class="section-header">
            <h2>Google Tasks</h2>
            <div class="section-line"></div>
          </div>
          <div class="google-tasks-frame-wrap">
            <iframe
              id="googleTasksFrame"
              src="https://tasks.google.com/embed/?origin=https://calendar.google.com&fullWidth=1"
              style="width:100%; height:500px; border:none; border-radius:8px; background:var(--card-bg);">
            </iframe>
          </div>
        </div>
      </div> <!-- END RIGHT COLUMN WRAPPER -->

    </div><!-- end .dashboard-columns -->

    <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
    <footer>
      <div class="footer-stats">
        <div class="stat">
          <div class="stat-num" id="statTabs">—</div>
          <div class="stat-label">Open tabs</div>
        </div>
      </div>
      <div class="last-refresh">
        <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/ziikki/tab-out" target="_top"
            style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> by <a
            href="https://github.com/ziikki" target="_top"
            style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Solareda</a></span>
      </div>
    </footer>

  </div><!-- end .container -->

  <!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
  <div class="toast" id="toast">
    <!-- Checkmark circle icon (Heroicons outline) -->
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
    </svg>
    <span id="toastText"></span>
  </div>

  <!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
  <script src="config.local.js"></script>

  <!-- Dashboard logic — loaded in dependency order -->
  <script src="utils/domain.js"></script>
  <script src="utils/time.js"></script>
  <script src="ui/icons.js"></script>
  <script src="ui/actions.js"></script>
  <script src="service/tabs.js"></script>
  <script src="service/storage.js"></script>
  <script src="service/tasks.js"></script>
  <script src="ui/renderer_tasks.js"></script>
  <script src="ui/renderer_tabs.js"></script>
  <script src="ui/renderers.js"></script>
  <script src="service/events.js"></script>
  <script src="main.js"></script>
</body>

</html>
